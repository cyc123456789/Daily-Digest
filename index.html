<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Today Digest — 每日全球資安、台海與地緣政治簡報">
<title>Today Digest ｜ 每日情報簡報</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e1116;--panel:#141a22;--line:#222b37;--line-l:#2e3a49;
  --text:#e8ecf1;--text2:#9aa7b4;--text3:#5c6b7a;
  --c-cyber:#4fc3e8;--c-taiwan:#e8a15c;--c-geo:#b39ce8;--c-eco:#6fcf97;
  --s-critical:#f27e7e;--s-high:#e8c468;--s-warning:#e8a15c;--s-medium:#7ea8f2;--s-info:#7a8a99;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --sans:'Noto Sans TC',-apple-system,sans-serif;
  --serif:'Noto Serif TC',serif;
  --rail-w:216px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:18px;line-height:1.85}
a{color:inherit}
:focus-visible{outline:2px solid var(--c-cyber);outline-offset:3px;border-radius:2px}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}html{scroll-behavior:auto}}

/* ── MASTHEAD ── */
.mast{border-bottom:1px solid var(--line);background:var(--bg)}
.mast-in{max-width:1180px;margin:0 auto;padding:1.75rem 1.25rem 0}
.mast-row{display:flex;align-items:baseline;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.wordmark{font-family:var(--serif);font-weight:900;font-size:26px;letter-spacing:0.02em}
.wordmark small{font-family:var(--mono);font-weight:400;font-size:11px;color:var(--text3);letter-spacing:0.25em;margin-left:0.75rem;vertical-align:0.2em}
.mast-date{display:flex;align-items:baseline;gap:1rem;margin:1.25rem 0 0.4rem}
.d-big{font-family:var(--mono);font-weight:600;font-size:clamp(30px,6vw,44px);letter-spacing:0.02em}
.d-week{font-size:18px;color:var(--text2)}
.focus-line{color:var(--text2);font-size:18px;max-width:46em;margin-bottom:0.4rem}
.focus-line b{color:var(--text);font-weight:500}
/* category index bar */
.cat-bar{display:flex;gap:0.25rem;overflow-x:auto;padding:0.6rem 0 0;margin:0 -2px}
.cat-bar::-webkit-scrollbar{display:none}
.cat-link{
  display:flex;align-items:center;gap:0.55rem;white-space:nowrap;
  font-size:15px;color:var(--text2);text-decoration:none;
  padding:0 0.9rem;height:46px;border-bottom:2px solid transparent;
}
.cat-link:hover{color:var(--text)}
.cat-link i{width:8px;height:8px;border-radius:1px;background:var(--cat)}
.cat-link em{font-style:normal;font-family:var(--mono);font-size:12px;color:var(--text3)}
.cat-link:hover{border-bottom-color:var(--cat)}

/* mobile date picker */
#dp-btn{
  display:none;align-items:center;gap:0.5rem;
  font-family:var(--mono);font-size:14px;color:var(--text2);
  background:transparent;border:1px solid var(--line);border-radius:4px;
  height:44px;padding:0 1rem;cursor:pointer;
}
#dp-btn:hover{border-color:var(--line-l);color:var(--text)}
#dp-menu{
  display:none;position:absolute;right:1.25rem;top:64px;z-index:60;
  max-height:60vh;overflow-y:auto;
  background:var(--panel);border:1px solid var(--line-l);border-radius:6px;
  box-shadow:0 12px 40px rgba(0,0,0,0.5);padding:0.4rem;min-width:190px;
}
#dp-menu.open{display:block}
.mast-top-rel{position:relative}

/* ── LAYOUT ── */
.wrap{max-width:1180px;margin:0 auto;padding:0 1.25rem;display:flex;gap:3rem}
.rail{
  width:var(--rail-w);flex-shrink:0;
  position:sticky;top:0;align-self:flex-start;
  max-height:100vh;overflow-y:auto;padding:1.75rem 0 3rem;
}
.rail::-webkit-scrollbar{width:3px}
.rail::-webkit-scrollbar-thumb{background:var(--line)}
.rail-label{font-family:var(--mono);font-size:11px;letter-spacing:0.25em;color:var(--text3);margin-bottom:0.75rem}
.date-list{list-style:none}
.date-btn,.dp-item{
  display:flex;align-items:center;justify-content:space-between;width:100%;
  font-family:var(--mono);font-size:14px;color:var(--text2);
  background:transparent;border:0;border-left:2px solid var(--line);
  padding:0 0.9rem;min-height:44px;cursor:pointer;text-align:left;gap:0.5rem;
}
.date-btn:hover{color:var(--text);border-left-color:var(--line-l)}
.date-btn.active{color:var(--text);border-left-color:var(--text);font-weight:600}
.d-new{font-size:10px;letter-spacing:0.15em;color:var(--c-taiwan)}
.dp-item{border-left:0;border-radius:4px}
.dp-item:hover{background:var(--line)}
.dp-item.active{color:var(--text);font-weight:600}

/* ── REPORT ── */
main{flex:1;min-width:0;padding:2.25rem 0 4rem}
.sec{margin-bottom:3.25rem}
.sec-head{display:flex;align-items:baseline;gap:1rem;padding-bottom:0.75rem;border-bottom:2px solid var(--cat);margin-bottom:0.25rem}
.sec-code{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:0.22em;color:var(--cat)}
.sec-title{font-family:var(--serif);font-weight:900;font-size:25px;letter-spacing:0.03em}
.sec-count{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--text3)}
.item{padding:1.6rem 0 1.5rem 1.15rem;border-bottom:1px solid var(--line);position:relative}
.item::before{content:'';position:absolute;left:0;top:1.9rem;bottom:1.7rem;width:2px;background:var(--cat);opacity:0.55}
.item:last-child{border-bottom:0}
.item-meta{display:flex;align-items:center;gap:0.9rem;margin-bottom:0.55rem;font-family:var(--mono);font-size:12.5px}
.item-idx{color:var(--text3)}
.sev{font-weight:600;letter-spacing:0.14em}
.sev-critical{color:var(--s-critical)}.sev-high{color:var(--s-high)}
.sev-warning{color:var(--s-warning)}.sev-medium{color:var(--s-medium)}.sev-info{color:var(--s-info)}
.item-src{color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-title{font-family:var(--serif);font-weight:700;font-size:21.5px;line-height:1.65;margin-bottom:0.6rem}
.item-title a{text-decoration:none;border-bottom:1px solid transparent;transition:border-color 0.15s}
.item-title a:hover{border-bottom-color:var(--cat)}
.item-title .nolink{color:var(--text)}
.item-sum{color:var(--text2);font-size:17.5px;margin-bottom:0.7rem;max-width:46em}
.item-tags{display:flex;flex-wrap:wrap;gap:0.4rem 1.1rem;font-family:var(--mono);font-size:11.5px;color:var(--text3);letter-spacing:0.04em}
.item-tags span::before{content:'#';opacity:0.5;margin-right:1px}

.state{padding:5rem 0;text-align:center;font-family:var(--mono);font-size:14px;color:var(--text3);letter-spacing:0.1em}
.state.err{color:var(--s-critical)}

footer{border-top:1px solid var(--line)}
.foot-in{max-width:1180px;margin:0 auto;padding:1.5rem 1.25rem 2.5rem;font-size:14px;color:var(--text3);line-height:1.8}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .rail{display:none}
  #dp-btn{display:flex}
  .wrap{gap:0}
  main{padding-top:1.5rem}
  .sec-title{font-size:22px}
  .item-title{font-size:20px}
  .item{padding-left:0.95rem}
  .d-week{font-size:16px}
}
@media(max-width:480px){
  .wordmark small{display:none}
  .item-src{max-width:38vw}
}
</style>
</head>
<body>

<header class="mast">
  <div class="mast-in mast-top-rel">
    <div class="mast-row">
      <span class="wordmark">Today Digest<small>DAILY BRIEF</small></span>
      <button id="dp-btn" aria-haspopup="true" aria-expanded="false" aria-label="選擇日期">
        <span id="dp-cur">－－</span> ▾
      </button>
      <div id="dp-menu" role="menu" aria-label="歷史日期"></div>
    </div>
    <div class="mast-date">
      <span class="d-big" id="m-date">－－－－</span>
      <span class="d-week" id="m-week"></span>
    </div>
    <p class="focus-line" id="m-focus" hidden></p>
    <nav class="cat-bar" id="cat-bar" aria-label="分類索引"></nav>
  </div>
</header>

<div class="wrap">
  <nav class="rail" aria-label="歷史報告">
    <div class="rail-label">ARCHIVE</div>
    <ul class="date-list" id="date-list"></ul>
  </nav>
  <main id="main" aria-live="polite">
    <div class="state">LOADING…</div>
  </main>
</div>

<footer><div class="foot-in">
  本網站內容由 AI 自動產生，僅供參考，非投資或資安建議。資訊可能有所延遲，使用前請自行查證。
</div></footer>

<script>
(function(){
'use strict';
var CATS={
  cyber:{name:'網路資安',code:'CYBER-SEC',color:'var(--c-cyber)'},
  taiwan:{name:'台海觀察',code:'TAIWAN-STR',color:'var(--c-taiwan)'},
  geo:{name:'地緣政治',code:'GEO-POL',color:'var(--c-geo)'},
  eco:{name:'能源經濟',code:'ENERGY-ECO',color:'var(--c-eco)'}
};
var WEEK=['日','一','二','三','四','五','六'];
var dates=[],current=null;
var $=function(id){return document.getElementById(id)};

function esc(s){var d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML}
function weekday(d){var p=d.split('-');return '星期'+WEEK[new Date(+p[0],p[1]-1,+p[2]).getDay()]}

function render(day){
  $('m-date').textContent=day.date;
  $('m-week').textContent=weekday(day.date);
  var f=$('m-focus');
  if(day.focus){f.innerHTML='今日焦點｜<b>'+esc(day.focus)+'</b>';f.hidden=false}
  else f.hidden=true;

  var bar='',body='';
  day.sections.forEach(function(sec){
    var c=CATS[sec.id]||{name:sec.id,code:sec.id.toUpperCase(),color:'var(--text3)'};
    bar+='<a class="cat-link" style="--cat:'+c.color+'" href="#'+day.date+'/'+sec.id+'">'+
      '<i></i>'+esc(c.name)+'<em>'+sec.items.length+'</em></a>';
    body+='<section class="sec" id="sec-'+esc(sec.id)+'" style="--cat:'+c.color+'">'+
      '<div class="sec-head"><span class="sec-code">'+esc(c.code)+'</span>'+
      '<h2 class="sec-title">'+esc(c.name)+'</h2>'+
      '<span class="sec-count">'+sec.items.length+' 則</span></div>';
    sec.items.forEach(function(it,i){
      var n=String(i+1).padStart(2,'0');
      var sev=(it.severity||'info').toLowerCase();
      var t=it.url
        ?'<a href="'+esc(it.url)+'" target="_blank" rel="noopener">'+esc(it.title)+'</a>'
        :'<span class="nolink">'+esc(it.title)+'</span>';
      var tags=(it.tags||[]).slice(0,4).map(function(x){return '<span>'+esc(x)+'</span>'}).join('');
      body+='<article class="item">'+
        '<div class="item-meta"><span class="item-idx">'+n+'</span>'+
        '<span class="sev sev-'+esc(sev)+'">'+esc(sev.toUpperCase())+'</span>'+
        (it.source?'<span class="item-src">'+esc(it.source)+'</span>':'')+'</div>'+
        '<h3 class="item-title">'+t+'</h3>'+
        '<p class="item-sum">'+esc(it.summary)+'</p>'+
        (tags?'<div class="item-tags">'+tags+'</div>':'')+
        '</article>';
    });
    body+='</section>';
  });
  $('cat-bar').innerHTML=bar;
  $('main').innerHTML=body;
}

function setActive(d){
  document.querySelectorAll('.date-btn,.dp-item').forEach(function(b){
    b.classList.toggle('active',b.dataset.date===d);
  });
  $('dp-cur').textContent=d;
}

function load(d,anchor){
  if(current===d){if(anchor)jump(anchor);return}
  current=d;setActive(d);
  $('main').innerHTML='<div class="state">LOADING '+esc(d)+'…</div>';
  fetch('reports/'+d+'.json').then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);
    return r.json();
  }).then(function(day){
    render(day);
    if(anchor)jump(anchor);else window.scrollTo(0,0);
  }).catch(function(e){
    $('main').innerHTML='<div class="state err">載入失敗（'+esc(e.message)+'）— 請重新整理或選擇其他日期</div>';
  });
}
function jump(sec){var el=$('sec-'+sec);if(el)el.scrollIntoView()}

function fromHash(){
  var h=location.hash.replace('#','').split('/');
  var d=/^\d{4}-\d{2}-\d{2}$/.test(h[0])&&dates.indexOf(h[0])>=0?h[0]:dates[0];
  load(d,h[1]);
}

/* date picker (mobile) */
var btn=$('dp-btn'),menu=$('dp-menu');
btn.addEventListener('click',function(e){
  e.stopPropagation();
  var open=menu.classList.toggle('open');
  btn.setAttribute('aria-expanded',open);
});
document.addEventListener('click',function(){menu.classList.remove('open');btn.setAttribute('aria-expanded','false')});

fetch('manifest.json').then(function(r){return r.json()}).then(function(list){
  dates=list;
  var rail=$('date-list');
  list.forEach(function(d,i){
    var li=document.createElement('li');
    var b=document.createElement('button');
    b.className='date-btn';b.dataset.date=d;
    b.innerHTML='<span>'+esc(d)+'</span>'+(i===0?'<span class="d-new">NEW</span>':'');
    b.addEventListener('click',function(){location.hash=d});
    li.appendChild(b);rail.appendChild(li);
    var m=b.cloneNode(true);
    m.className='dp-item';m.dataset.date=d;
    m.addEventListener('click',function(){location.hash=d});
    menu.appendChild(m);
  });
  window.addEventListener('hashchange',fromHash);
  fromHash();
}).catch(function(e){
  $('main').innerHTML='<div class="state err">無法載入日期清單（'+esc(e.message)+'）</div>';
});
})();
</script>
</body>
</html>
